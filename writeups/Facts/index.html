  <meta charset="utf-8" />

  <title>HTB Writeup - Facts</title>
  <script>
    (function () {
      const THEME_STORAGE_KEY = 'portfolio-theme';
      let theme = 'dark';
      try {
        const stored = localStorage.getItem(THEME_STORAGE_KEY);
        if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
          theme = 'light';
        }
      } catch (error) {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
          theme = 'light';
        }
      }
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link href="../../styles.css" rel="stylesheet" />
  <link href="../writeups.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css">

  <script>
    const currentYearEl = document.getElementById('current-year');
    if (currentYearEl) {
      currentYearEl.textContent = new Date().getFullYear();
    }

    document.querySelectorAll('[data-toggle]').forEach((toggle) => {
      toggle.addEventListener('click', () => {
        const targetId = toggle.getAttribute('data-toggle');
        const target = document.getElementById(targetId);
        if (!target) return;

        const isHidden = target.hasAttribute('hidden');
        if (isHidden) {
          target.removeAttribute('hidden');
        } else {
          target.setAttribute('hidden', '');
        }

        if (toggle.classList.contains('hint-toggle')) {
          toggle.classList.toggle('active', isHidden);
        }

        if (toggle.classList.contains('writeup-toggle')) {
          toggle.textContent = isHidden ? 'Hide Writeup' : 'Reveal Writeup';
        }
      });
    });
  </script>
