<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Writeups | Yassine SABIR</title>
  <link href="../assets/Icone.png" rel="icon" type="image/png" />
  <script>
    (function () {
      const THEME_STORAGE_KEY = 'portfolio-theme';
      let theme = 'dark';
      try {
        const stored = localStorage.getItem(THEME_STORAGE_KEY);
        if (stored === 'light' || stored === 'dark') {
          theme = stored;
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
          theme = 'light';
        }
      } catch (error) {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
          theme = 'light';
        }
      }
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link href="../styles.css" rel="stylesheet" />
  <link href="./writeups.css" rel="stylesheet" />
</head>

<body class="challenge-body">
  <header class="challenge-hero" style="position: relative;">
    <div style="position: absolute; top: 1.5rem; right: 2rem; z-index: 10;">
      <button aria-label="Switch to light mode" class="theme-toggle" data-theme-toggle="" type="button">
        <span class="theme-track">
          <span aria-hidden="true" class="theme-thumb">
            <span class="theme-icon theme-icon-sun">☀</span>
            <span class="theme-icon theme-icon-moon">☾</span>
          </span>
        </span>
      </button>
    </div>
    <div class="hero-inner">
      <h1>Writeups</h1>
      <p class="challenge-tagline"></p>
      <a class="btn ghost" href="../index.html">← Back to Portfolio</a>
    </div>
  </header>

  <main class="challenge-main">
    <section aria-labelledby="collection-title" class="card">
      <header class="section-heading"
        style="display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: nowrap; width: 100%; gap: 1rem; margin-bottom: 1.5rem;">
        <div>
          <p class="eyebrow" style="margin-bottom: 0.2rem;">Collection</p>
          <h2 id="collection-title" style="margin: 0;">Browse the reports</h2>
        </div>
        <div class="search-container">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="writeup-search" placeholder="Search writeups..." aria-label="Search writeups"
            class="search-input" />
        </div>
      </header>
      <div class="writeups-table" role="table" aria-label="Writeups list">
        <div class="writeups-row writeups-head" role="row">
          <span role="columnheader" data-sort="name">Machine <span class="sort-icon"></span></span>
          <span role="columnheader" data-sort="category">Category <span class="sort-icon"></span></span>
          <span role="columnheader" data-sort="difficulty">Difficulty <span class="sort-icon"></span></span>
          <span role="columnheader" data-sort="os">OS <span class="sort-icon"></span></span>
        </div>

      </div>
    </section>
  </main>
  <footer class="site-footer">
    <p data-i18n="footer.tagline">© <span id="year"></span> Yassine SABIR - All rights reserved.</p>
    <a class="back-to-top" data-i18n="footer.backToTop" href="#top">Back to top</a>
  </footer>
  <script>
    const themeBtn = document.querySelector('[data-theme-toggle]');
    if (themeBtn) {
      const THEME_STORAGE_KEY = 'portfolio-theme';
      const setThemeUI = () => {
        const _theme = document.documentElement.dataset.theme || 'dark';
        themeBtn.classList.toggle('is-light', _theme === 'light');
        themeBtn.classList.toggle('is-dark', _theme !== 'light');
        themeBtn.setAttribute('aria-label', _theme === 'light' ? 'Switch to dark mode' : 'Switch to light mode');
      };
      setThemeUI();
      themeBtn.addEventListener('click', () => {
        const nextTheme = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
        document.documentElement.dataset.theme = nextTheme;
        localStorage.setItem(THEME_STORAGE_KEY, nextTheme);
        setThemeUI();
      });
    }
  </script>
  <script src="./script.js"></script>
</body>

</html>
